# Cloudflare Workers Konfiguration für Osterfest Buffet

name = "osterfest-buffet-api"
main = "workers/api.ts"
compatibility_date = "2024-03-01"

# D1 Datenbank Bindung
[[d1_databases]]
binding = "DB"
database_name = "osterfest-buffet"
database_id = "IHRE_DATABASE_ID_HIER" # Wird nach der Erstellung der Datenbank eingetragen

# Für lokale Entwicklung
[env.dev]
[[env.dev.d1_databases]]
binding = "DB"
database_name = "osterfest-buffet"
database_id = "IHRE_DATABASE_ID_HIER"
